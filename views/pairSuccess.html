<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connected</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #1c1c1c;
      padding: 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      text-align: center;
    }
    h1 {
      color: #b1926c;
    }
    p {
      color: #ddd;
      line-height: 1.5;
    }
    .target {
      margin-top: 16px;
      font-weight: bold;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Phone connected</h1>
    <p>Your phone is now linked to this room TV.</p>
    <p class="target">Cast target: __CAST_TARGET__</p>
    <p>Open Netflix, YouTube, Spotify or another supported app and choose this TV from the cast list.</p>
  </div>
</body>
</html>
