<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connection failed</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #1c1c1c;
      padding: 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      text-align: center;
    }
    h1 {
      color: #ff7b7b;
    }
    p {
      color: #ddd;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      margin-top: 16px;
      color: #b1926c;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connection failed</h1>
    <p>__ERROR_MESSAGE__</p>
    <a href="__RETRY_URL__">Try again</a>
  </div>
</body>
</html>
